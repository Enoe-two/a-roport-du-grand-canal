; Configuration PHP pour Railway
; Force la connexion TCP/IP à MySQL (pas de socket Unix)
mysqli.default_host = mysql.railway.internal
mysqli.default_port = 3306
pdo_mysql.default_socket =
mysqli.default_socket =

; Timeouts adaptés à Railway
default_socket_timeout = 10
mysql.connect_timeout = 10

; Extensions
extension = pdo_mysql
extension = mysqli
extension = mysqlnd
